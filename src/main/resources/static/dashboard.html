<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Skill Bridge Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
}

.header{
    text-align:center;
    color:white;
    padding:40px;
}

.header h1{
    font-size:40px;
}

.header p{
    margin-top:10px;
    font-size:18px;
}

.cards{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
    padding:30px;
}

.card{
    width:300px;
    background:white;
    border-radius:15px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card h2{
    color:#2c3e50;
    margin-bottom:15px;
}

.card p{
    color:#555;
    margin-bottom:20px;
}

button{
    background:#667eea;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    background:#4c5bd4;
}

.footer{
    text-align:center;
    color:white;
    margin-top:20px;
    padding-bottom:20px;
}

</style>

</head>

<body>

<div class="header">

<h1>🚀 Skill Bridge Dashboard</h1>

<p>Your Career Development & Learning Portal</p>

</div>

<div class="cards">

<div class="card">

<h2>📚 Explore Careers</h2>

<p>
View skills, roadmaps, books and learning platforms
for your chosen career.
</p>

<button onclick="location.href='career.html'">
Open
</button>

</div>

<div class="card">

<h2>⚖ Career Comparison</h2>

<p>
Compare career paths based on salary, demand,
difficulty and learning time.
</p>

<button onclick="location.href='career-comparison.html'">
Open
</button>

</div>

</div>

<div class="footer">

<h3>Skill Bridge © 2026</h3>

</div>

</body>
</html>
